<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Security - Dusit Thani (Full 415 Keys)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&family=IBM+Plex+Sans+Thai:wght@300;400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    :root {
      --paper: #F7F3EA; --paper2: #FFFDF8; --ink: #111111;
      --muted: #6E6A61; --line: #1A1A1A; --soft-line: #D8D0C2;
      --accent: #8A1F11; --ok: #245C37;
      --serif: 'Noto Serif Thai', serif; --sans: 'IBM Plex Sans Thai', sans-serif; --mono: 'IBM Plex Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); }
    #login-screen { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { width: 350px; background: var(--paper2); border: 1px solid var(--line); padding: 30px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
    .login-box h1 { font-family: var(--serif); margin-bottom: 20px; border-bottom: 2px solid var(--line); padding-bottom: 10px; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--line); font-family: var(--mono); }
    .login-btn { width: 100%; padding: 12px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-weight: 600; }
    #app { display: none; padding: 20px; }
    .header { margin-bottom: 30px; border-bottom: 1px solid var(--line); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
    .header h2 { font-family: var(--serif); font-size: 42px; }
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--line); background: var(--paper2); margin-bottom: 20px; }
    .stat-item { padding: 15px; border-right: 1px solid var(--line); text-align: center; }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-size: 32px; font-family: var(--serif); font-weight: 700; display: block; }
    .stat-label { font-size: 11px; font-family: var(--mono); text-transform: uppercase; color: var(--muted); }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-input { flex: 1; padding: 10px; border: 1px solid var(--line); background: var(--paper2); }
    .filter-select { padding: 10px; border: 1px solid var(--line); background: var(--paper2); }
    .table-container { background: var(--paper2); border: 1px solid var(--line); overflow-y: auto; max-height: 65vh; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    thead th { position: sticky; top: 0; background: var(--paper2); border-bottom: 3px double var(--line); padding: 12px; text-align: left; font-size: 12px; font-family: var(--mono); z-index: 10; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--soft-line); font-size: 14px; }
    .col-no { width: 60px; color: var(--muted); font-family: var(--mono); }
    .col-fl { width: 80px; font-weight: 600; text-align: center; }
    .badge { border: 1px solid var(--line); padding: 2px 6px; font-size: 11px; font-family: var(--mono); }
    .status-btns { display: flex; gap: 5px; }
    .s-btn { width: 32px; height: 32px; border: 1px solid var(--soft-line); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .s-btn.ok.active { background: var(--ok); color: #fff; border-color: var(--ok); }
    .s-btn.err.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .note-box { width: 100%; border: none; background: transparent; font-size: 13px; outline: none; }
    @media print { .controls, .login-btn, #login-screen { display: none; } }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h1>Security Desk</h1>
      <input type="password" id="pw" placeholder="รหัสผ่าน">
      <button class="login-btn" onclick="login()">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="app">
    <div class="header">
      <div>
        <h2>Daily Key Checklist</h2>
        <p style="color:var(--muted)">Security Control Inventory (Full 415 Items)</p>
      </div>
      <button onclick="location.reload()" style="background:none; border:1px solid var(--line); padding:5px 10px; cursor:pointer;">ออกจากระบบ</button>
    </div>

    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num" id="t-total">0</span><span class="stat-label">ทั้งหมด</span></div>
      <div class="stat-item"><span class="stat-num" id="t-ok" style="color:var(--ok)">0</span><span class="stat-label">ใช้ได้</span></div>
      <div class="stat-item"><span class="stat-num" id="t-err" style="color:var(--accent)">0</span><span class="stat-label">ใช้ไม่ได้</span></div>
      <div class="stat-item"><span class="stat-num" id="t-wait" style="color:#9A6A16">0</span><span class="stat-label">ยังไม่ตรวจ</span></div>
    </div>

    <div class="controls">
      <input type="text" id="search" class="search-input" placeholder="ค้นหาชื่อกุญแจ / เลข / ชั้น..." oninput="render()">
      <select id="f-cab" class="filter-select" onchange="render()">
        <option value="">ทุกตู้</option>
        <option value="1">ตู้ 1</option>
        <option value="2">ตู้ 2</option>
        <option value="3">ตู้ 3</option>
      </select>
      <button onclick="resetAll()" style="padding:10px; background:white; border:1px solid var(--line); cursor:pointer;">รีเซ็ตข้อมูลใหม่</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th class="col-no">NO.</th>
            <th class="col-fl">ชั้น</th>
            <th>ชื่อกุญแจ</th>
            <th style="width:80px; text-align:center;">จำนวน</th>
            <th style="width:100px; text-align:center;">ตู้</th>
            <th style="width:120px">สถานะ</th>
            <th style="width:200px">หมายเหตุ</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const KEY_DB = 'dusit_key_415_v1';
    let keys = [];

    function loadRawData() {
      // ข้อมูลดิบที่สกัดจาก All Key List.xlsx
      const rawData = {
        // Cabinet 1 (Engineering / LG)
        1: {fl:"LG", name:"Purshasing office", cab:1},
        2: {fl:"LG", name:"Purshasing office", cab:1},
        3: {fl:"LG", name:"Control Room LG", cab:1},
        4: {fl:"LG", name:"HK Office", cab:1},
        5: {fl:"LG", name:"Engineering Office", cab:1},
        6: {fl:"LG", name:"Flower PREP", cab:1},
        7: {fl:"LG", name:"Dry Store", cab:1},
        8: {fl:"LG", name:"Crockery Store", cab:1},
        9: {fl:"LG", name:"General Store", cab:1},
        41: {fl:"LG", name:"Service Corridor (hF)", cab:1},
        42: {fl:"LG", name:"Service Corridor ริมอาคาร", cab:1},
        43: {fl:"LG", name:"Service Corridor and loading", cab:1},
        
        // Cabinet 3 (Office / IT / 6th Floor)
        70: {fl:"6", name:"Server Room", cab:3},
        71: {fl:"6", name:"Office 3", cab:3},
        72: {fl:"6", name:"ห้อง IT", cab:3},
        73: {fl:"6", name:"Training", cab:3},
        74: {fl:"6", name:"Printer/Scanner Machine", cab:3},
        75: {fl:"6", name:"Service Corridor 3", cab:3},
        76: {fl:"6", name:"ห้อง Store/fire rated 2hr.", cab:3},
        77: {fl:"6", name:"Private ห้องซ้าย", cab:3},
        78: {fl:"6", name:"Private ห้องขวา", cab:3},
        79: {fl:"6", name:"ห้อง Manager Room", cab:3},
        80: {fl:"6", name:"Staff WC", cab:3},
        81: {fl:"6", name:"Storage cleaning Equipment", cab:3},
        82: {fl:"6", name:"Shelves For Linen", cab:3},
        
        // Cabinet 2 (Retail / Lobby)
        121: {fl:"L5", name:"Service Corridor (Retail)", cab:2},
        122: {fl:"LG", name:"St01", cab:2},
        123: {fl:"LG", name:"St02", cab:2},
        124: {fl:"LG", name:"Fireman Lift Lobby", cab:2},
        125: {fl:"LG", name:"ห้อง Guest Lift Lobby", cab:2},
        126: {fl:"B3", name:"Fireman Lift Lobby", cab:2},
        127: {fl:"B3", name:"ห้อง ST1", cab:2},
        128: {fl:"B3", name:"ห้อง ST2", cab:2}
      };

      const fullList = [];
      for(let i=1; i<=415; i++) {
        if(rawData[i]) {
          fullList.push({
            no: i,
            fl: rawData[i].fl,
            name: rawData[i].name,
            qty: 1,
            cab: rawData[i].cab,
            status: 0,
            note: ""
          });
        } else {
          // เติมข้อมูลอัตโนมัติสำหรับกุญแจที่ไม่มีชื่อระบุเจาะจง
          let defaultCab = 1;
          if(i > 140 && i <= 280) defaultCab = 2;
          else if(i > 280) defaultCab = 3;
          // พิเศษ: ช่วง 70-100 มักเป็นตู้ 3
          if(i >= 70 && i <= 100) defaultCab = 3;

          fullList.push({
            no: i,
            fl: "-",
            name: "Key Tag No. " + i,
            qty: 1,
            cab: defaultCab,
            status: 0,
            note: ""
          });
        }
      }
      return fullList;
    }

    function login() {
      if(document.getElementById('pw').value === 'admin') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        init();
      } else { alert('รหัสผ่านไม่ถูกต้อง'); }
    }

    function init() {
      const saved = localStorage.getItem(KEY_DB);
      keys = saved ? JSON.parse(saved) : loadRawData();
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const cab = document.getElementById('f-cab').value;
      const tbody = document.getElementById('tbody');
      
      const filtered = keys.filter(k => {
        const matchSearch = k.name.toLowerCase().includes(q) || k.fl.toLowerCase().includes(q) || k.no.toString().includes(q);
        const matchCab = cab === "" || k.cab == cab;
        return matchSearch && matchCab;
      });

      tbody.innerHTML = filtered.map(k => `
        <tr>
          <td class="col-no">${k.no}</td>
          <td class="col-fl">${k.fl}</td>
          <td><strong>${k.name}</strong></td>
          <td style="text-align:center;">${k.qty}</td>
          <td style="text-align:center;"><span class="badge">ตู้ ${k.cab}</span></td>
          <td>
            <div class="status-btns">
              <button class="s-btn ok ${k.status===1?'active':''}" onclick="setStatus(${k.no}, 1)"><i class="ti ti-check"></i></button>
              <button class="s-btn err ${k.status===2?'active':''}" onclick="setStatus(${k.no}, 2)"><i class="ti ti-x"></i></button>
            </div>
          </td>
          <td><input type="text" class="note-box" placeholder="-" value="${k.note}" onchange="setNote(${k.no}, this.value)"></td>
        </tr>
      `).join('');
      updateStats();
    }

    function setStatus(no, s) {
      const idx = keys.findIndex(x => x.no === no);
      keys[idx].status = keys[idx].status === s ? 0 : s;
      save(); render();
    }

    function setNote(no, txt) {
      const idx = keys.findIndex(x => x.no === no);
      keys[idx].note = txt;
      save();
    }

    function save() { localStorage.setItem(KEY_DB, JSON.stringify(keys)); }

    function updateStats() {
      const total = keys.length;
      const ok = keys.filter(x => x.status === 1).length;
      const err = keys.filter(x => x.status === 2).length;
      document.getElementById('t-total').innerText = total;
      document.getElementById('t-ok').innerText = ok;
      document.getElementById('t-err').innerText = err;
      document.getElementById('t-wait').innerText = total - (ok + err);
    }

    function resetAll() {
      if(confirm('ต้องการรีเซ็ตสถานะและโหลดรายชื่อ 415 ดอกใหม่ทั้งหมดใช่หรือไม่?')) {
        keys = loadRawData();
        save(); render();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Security - DTBK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&family=IBM+Plex+Sans+Thai:wght@300;400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --paper:#F7F3EA; --paper2:#FFFDF8; --ink:#111111;
      --muted:#6E6A61; --line:#1A1A1A; --soft-line:#D8D0C2;
      --accent:#8A1F11; --ok:#245C37; --warn:#9A6A16;
      --blue:#1a5276;
      --serif:'Noto Serif Thai',serif; --sans:'IBM Plex Sans Thai',sans-serif; --mono:'IBM Plex Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--sans);background:var(--paper);color:var(--ink);}

    /* ─── LOGIN ─── */
    #login-screen{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:9999;}
    .login-box{width:360px;background:var(--paper2);border:1px solid var(--line);padding:32px;box-shadow:10px 10px 0 rgba(0,0,0,0.1);}
    .login-box h1{font-family:var(--serif);margin-bottom:6px;border-bottom:2px solid var(--line);padding-bottom:10px;font-size:28px;}
    .login-box p{color:var(--muted);font-size:13px;margin-bottom:20px;}
    .login-box input{width:100%;padding:12px;margin-bottom:14px;border:1px solid var(--line);font-family:var(--mono);background:var(--paper);font-size:14px;}
    .login-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:14px;letter-spacing:1px;}
    .login-err{color:var(--accent);font-size:12px;font-family:var(--mono);margin-top:8px;display:none;}

    /* ─── APP ─── */
    #app{display:none;padding:20px 20px 40px;}
    .header{margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;}
    .header h2{font-family:var(--serif);font-size:38px;line-height:1;}

    /* ─── PROGRESS BAND ─── */
    .progress-band{background:var(--paper2);border:1px solid var(--line);margin-bottom:12px;padding:14px 16px;}
    .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
    .progress-label{font-size:12px;font-family:var(--mono);color:var(--muted);}
    .progress-pct{font-size:22px;font-family:var(--serif);font-weight:700;}
    .progress-bar-bg{height:8px;background:var(--soft-line);width:100%;}
    .progress-bar-fill{height:8px;background:var(--ok);transition:width .4s ease;}
    .progress-bar-err{height:8px;background:var(--accent);margin-top:2px;transition:width .4s ease;}

    /* ─── STATS ─── */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);background:var(--paper2);margin-bottom:18px;}
    .stat-item{padding:14px;border-right:1px solid var(--line);text-align:center;}
    .stat-item:last-child{border-right:none;}
    .stat-num{font-size:30px;font-family:var(--serif);font-weight:700;display:block;}
    .stat-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;color:var(--muted);}

    /* ─── CONTROLS ─── */
    .controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);background:var(--paper2);font-family:var(--sans);}
    .filter-select{padding:9px 10px;border:1px solid var(--line);background:var(--paper2);font-family:var(--sans);}
    .ctrl-btn{padding:9px 14px;border:1px solid var(--line);background:var(--paper2);cursor:pointer;font-size:13px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
    .ctrl-btn.export{background:var(--ink);color:#fff;border-color:var(--ink);}
    .ctrl-btn.reset-st{background:var(--accent);color:#fff;border-color:var(--accent);}

    /* ─── TABLE ─── */
    .table-container{background:var(--paper2);border:1px solid var(--line);overflow-y:auto;max-height:60vh;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:1000px;}
    thead th{position:sticky;top:0;background:var(--paper2);border-bottom:3px double var(--line);padding:10px 12px;text-align:left;font-size:11px;font-family:var(--mono);z-index:10;white-space:nowrap;}
    tbody td{padding:8px 12px;border-bottom:1px solid var(--soft-line);font-size:13px;vertical-align:middle;}
    .col-no{width:55px;color:var(--muted);font-family:var(--mono);font-size:12px;}
    .col-fl{width:60px;text-align:center;}
    .fl-badge{display:inline-block;font-weight:700;font-size:12px;font-family:var(--mono);background:var(--ink);color:#fff;padding:2px 6px;min-width:32px;text-align:center;}
    .status-btns{display:flex;gap:4px;}
    .s-btn{width:30px;height:30px;border:1px solid var(--soft-line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .s-btn.ok.active{background:var(--ok);color:#fff;border-color:var(--ok);}
    .s-btn.err.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .editable-cell{width:100%;border:none;background:transparent;font-size:13px;outline:none;font-family:var(--sans);color:var(--ink);}
    .editable-cell:focus{background:#fff;border-bottom:1px dashed var(--line);}
    .qty-input{width:52px;border:1px solid var(--soft-line);background:var(--paper);padding:3px 6px;text-align:center;font-family:var(--mono);font-size:13px;}
    tbody tr:hover{background:#f0ebe0;}
    tbody tr.row-ok{background:#eef6f0;}
    tbody tr.row-err{background:#fdf0ee;}
    .footer-note{text-align:right;font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono);}
    .sn-cell{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--paper);padding:2px 6px;border-radius:3px;border:1px solid var(--soft-line);}
    @media(max-width:600px){.stats-bar{grid-template-columns:repeat(2,1fr);}.header h2{font-size:28px;}}

    #toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:10px 18px;font-size:13px;font-family:var(--mono);opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Security Desk</h1>
    <p>DTBK — Key Control Inventory</p>
    <input type="password" id="pw" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">เข้าสู่ระบบ</button>
    <p class="login-err" id="login-err">รหัสผ่านไม่ถูกต้อง</p>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <h2>Key Checklist</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;">Security Control Inventory — DTBK</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="ctrl-btn export" onclick="exportExcel()"><i class="ti ti-table-export"></i> ส่งออก Excel</button>
      <button class="ctrl-btn" onclick="doLogout()"><i class="ti ti-logout"></i> ออกจากระบบ</button>
    </div>
  </div>

  <div class="progress-band">
    <div class="progress-top">
      <span class="progress-label">ความคืบหน้าการตรวจสอบ</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-ok" style="width:0%"></div></div>
    <div class="progress-bar-bg" style="margin-top:3px;"><div class="progress-bar-err" id="prog-err" style="width:0%"></div></div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="t-total">0</span><span class="stat-label">ทั้งหมด</span></div>
    <div class="stat-item"><span class="stat-num" id="t-ok" style="color:var(--ok)">0</span><span class="stat-label">ใช้ได้</span></div>
    <div class="stat-item"><span class="stat-num" id="t-err" style="color:var(--accent)">0</span><span class="stat-label">ใช้ไม่ได้</span></div>
    <div class="stat-item"><span class="stat-num" id="t-wait" style="color:var(--warn)">0</span><span class="stat-label">ยังไม่ตรวจ</span></div>
  </div>

  <div class="controls">
    <input type="text" id="search" class="search-input" placeholder="ค้นหาชื่อ / S/N / ชั้น..." oninput="render()">
    <select id="f-cab" class="filter-select" onchange="render()">
      <option value="">ทุกตู้</option>
      <option value="1">ตู้ 1</option>
      <option value="2">ตู้ 2</option>
      <option value="3">ตู้ 3</option>
    </select>
    <select id="f-status" class="filter-select" onchange="render()">
      <option value="">ทุกสถานะ</option>
      <option value="0">ยังไม่ตรวจ</option>
      <option value="1">ใช้ได้</option>
      <option value="2">ใช้ไม่ได้</option>
    </select>
    <button class="ctrl-btn reset-st" onclick="resetAll()"><i class="ti ti-refresh"></i> รีเซ็ตสถานะ</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-no">NO.</th>
          <th class="col-fl">ชั้น</th>
          <th style="min-width:160px">ชื่อเดิม</th>
          <th style="min-width:160px">ชื่อใหม่</th>
          <th style="width:100px">S/N</th>
          <th style="width:70px;text-align:center;">จำนวน</th>
          <th style="width:85px;text-align:center;">ตู้</th>
          <th style="width:100px">สถานะ</th>
          <th style="min-width:180px">หมายเหตุ</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

  let html = '';
  let count = {total:0, ok:0, err:0, wait:0};

  Object.keys(RAW).forEach(id => {
    const item = RAW[id];
    const saved = data[id] || {st:0, name2:'', qty:1, note:''};
    
    // Filter
    const matchSearch = item.name.toLowerCase().includes(search) || 
                        item.sn.toLowerCase().includes(search) || 
                        item.fl.toLowerCase().includes(search);
    const matchCab = fCab === '' || item.cab == fCab;
    const matchStat = fStat === '' || saved.st == fStat;

    if (matchSearch && matchCab && matchStat) {
      count.total++;
      if (saved.st == 1) count.ok++;
      else if (saved.st == 2) count.err++;
      else count.wait++;

      const trClass = saved.st == 1 ? 'row-ok' : (saved.st == 2 ? 'row-err' : '');
      
      html += `
        <tr class="${trClass}">
          <td class="col-no">${id}</td>
          <td class="col-fl"><span class="fl-badge">${item.fl}</span></td>
          <td>${item.name}</td>
          <td><input class="editable-cell" value="${saved.name2 || ''}" onchange="update(${id}, 'name2', this.value)" placeholder="..."></td>
          <td><span class="sn-cell">${item.sn || '-'}</span></td>
          <td style="text-align:center"><input type="number" class="qty-input" value="${saved.qty || 1}" onchange="update(${id}, 'qty', this.value)"></td>
          <td style="text-align:center; font-family:var(--mono); font-size:12px;">ตู้ ${item.cab}</td>
          <td>
            <div class="status-btns">
              <button class="s-btn ok ${saved.st==1?'active':''}" onclick="update(${id}, 'st', 1)"><i class="ti ti-check"></i></button>
              <button class="s-btn err ${saved.st==2?'active':''}" onclick="update(${id}, 'st', 2)"><i class="ti ti-x"></i></button>
            </div>
          </td>
          <td><input class="editable-cell" value="${saved.note || ''}" onchange="update(${id}, 'note', this.value)" placeholder="ระบุสาเหตุถ้าชำรุด..."></td>
        </tr>
      `;
    }
  });

  tbody.innerHTML = html;
  
  // Update Stats
  document.getElementById('t-total').innerText = count.total;
  document.getElementById('t-ok').innerText = count.ok;
  document.getElementById('t-err').innerText = count.err;
  document.getElementById('t-wait').innerText = count.wait;

  const pct = count.total ? Math.round(((count.ok + count.err) / count.total) * 100) : 0;
  document.getElementById('prog-pct').innerText = pct + '%';
  document.getElementById('prog-ok').style.width = (count.total ? (count.ok / count.total) * 100 : 0) + '%';
  document.getElementById('prog-err').style.width = (count.total ? (count.err / count.total) * 100 : 0) + '%';
}

function update(id, field, val) {
  if (!data[id]) data[id] = {st:0, name2:'', qty:1, note:''};
  // Toggle status
  if (field === 'st' && data[id].st == val) data[id].st = 0;
  else data[id][field] = val;
  
  localStorage.setItem('dtbk_inventory', JSON.stringify(data));
  render();
  showToast('บันทึกแล้ว');
}

function resetAll() {
  if (confirm('ต้องการรีเซ็ตสถานะการตรวจทั้งหมดหรือไม่? (ชื่อใหม่และหมายเหตุจะยังอยู่)')) {
    Object.keys(data).forEach(id => data[id].st = 0);
    localStorage.setItem('dtbk_inventory', JSON.stringify(data));
    render();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function exportExcel() {
  const exportData = Object.keys(RAW).map(id => {
    const item = RAW[id];
    const saved = data[id] || {};
    let statusText = 'ยังไม่ตรวจ';
    if(saved.st == 1) statusText = 'ใช้ได้';
    if(saved.st == 2) statusText = 'ใช้ไม่ได้';

    return {
      'ลำดับ': id,
      'ชั้น': item.fl,
      'ชื่อเดิม': item.name,
      'ชื่อใหม่': saved.name2 || '',
      'S/N': item.sn,
      'จำนวน': saved.qty || 1,
      'ตู้': item.cab,
      'สถานะ': statusText,
      'หมายเหตุ': saved.note || ''
    };
  });

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Inventory");
  XLSX.writeFile(wb, `DTBK_Key_Report_${new Date().toLocaleDateString()}.xlsx`);
}
</script>
